<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Learner — Visualize Any Game</title>
  <meta name="description" content="Paste any chess PGN notation and watch the game play out move by move with voice narration." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── Top App Bar ── -->
  <header class="top-bar">
    <div class="top-bar-icon">♟</div>
    <span class="top-bar-title">Chess<span>Learner</span></span>
    <span class="top-bar-subtitle">Paste PGN · Replay with voice narration</span>
  </header>

  <!-- ── Content ── -->
  <div class="content-area">

    <!-- ══ LEFT PANEL ══ -->
    <aside class="panel-left">

      <!-- 1. Speed + Voice Card  ← ABOVE PGN -->
      <div class="md-card speed-card">
        <div class="card-header">
          <span class="card-title">Playback Speed</span>
          <button id="btn-voice" class="voice-btn active" title="Toggle voice narration" aria-label="Voice narration on/off">
            <svg id="voice-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <span id="voice-label">Voice On</span>
          </button>
        </div>
        <div class="speed-card-body">
          <span class="speed-min-label">1s</span>
          <input type="range" id="speed-slider" class="md-slider"
            min="1000" max="5000" step="500" value="2000"
            aria-label="Playback speed: 1 to 5 seconds per move" />
          <span class="speed-max-label">5s</span>
          <span id="speed-val" class="speed-badge">2.0s</span>
        </div>
      </div>

      <!-- 2. PGN Input Card -->
      <div class="md-card">
        <div class="card-header">
          <span class="card-title">PGN Notation</span>
          <div style="display:flex;gap:7px;">
            <button id="btn-load-sample" class="md-btn md-btn-tonal" style="height:30px;padding:0 11px;font-size:0.73rem;">Sample</button>
            <button id="btn-fetch-game" class="md-btn md-btn-fetch" aria-label="Load a different game from lichess.org">
              <svg id="fetch-spin-icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
              <span id="fetch-label">Load Different Game</span>
            </button>
          </div>
        </div>
        <div class="card-body">
          <textarea
            id="pgn-input"
            class="pgn-textarea"
            placeholder="Paste PGN here…&#10;&#10;Example:&#10;1. e4 e5 2. Nf3 Nc6 3. Bb5 a6 4. Ba4"
            spellcheck="false"
            aria-label="PGN Notation Input"
          ></textarea>
          <div class="action-row">
            <button id="btn-analyze" class="md-btn md-btn-filled" aria-label="Visualize game">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Visualize Game
            </button>
            <button id="btn-clear" class="md-btn md-btn-tonal" aria-label="Clear">Clear</button>
          </div>
        </div>
      </div>

      <!-- 3. Controls Card  ← IN SIDEBAR -->
      <div class="md-card controls-sidebar">
        <div class="card-header">
          <span class="card-title">Controls</span>
          <span class="keyboard-hint">← → Space</span>
        </div>
        <div class="controls-body">
          <button id="btn-start" class="ctrl-sidebar-btn" title="Go to start" aria-label="Go to start" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button id="btn-prev" class="ctrl-sidebar-btn" title="Previous move" aria-label="Previous move" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm12 12L9.5 12 18 6z"/></svg>
          </button>
          <button id="btn-play-pause" class="ctrl-sidebar-play" title="Play" aria-label="Play / Pause" disabled>
            <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span id="play-label">Play</span>
          </button>
          <button id="btn-next" class="ctrl-sidebar-btn" title="Next move" aria-label="Next move" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/></svg>
          </button>
          <button id="btn-end" class="ctrl-sidebar-btn" title="Go to end" aria-label="Go to end" disabled>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-12h2v12H8z"/></svg>
          </button>
        </div>
        <!-- Progress bar inside controls -->
        <div class="sidebar-progress">
          <div class="progress-track" id="progress-track"
            role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="progress-fill"></div>
            <div class="progress-knob" id="progress-knob"></div>
          </div>
          <span class="move-counter" id="progress-label">Move 0 / 0</span>
        </div>
      </div>

      <!-- 4. Game Info -->
      <div class="md-card game-info hidden" id="game-info" aria-live="polite">
        <div class="card-header">
          <span class="card-title">Game Details</span>
        </div>
        <div class="game-info-inner">
          <div class="info-field" id="info-event"></div>
          <div class="info-field" id="info-players"></div>
          <div class="info-field" id="info-date"></div>
          <div class="info-field" id="info-result"></div>
        </div>
      </div>

      <!-- 5. Move List -->
      <div class="md-card movelist-card">
        <div class="card-header">
          <span class="card-title">Move List</span>
          <span id="move-counter" style="font-size:0.7rem;color:var(--md-text-low);font-family:'Roboto Mono',monospace;">0 / 0</span>
        </div>
        <div id="move-list" class="move-scroll" role="list" aria-label="Chess moves"></div>
      </div>

    </aside>

    <!-- ══ RIGHT PANEL — Board only ══ -->
    <section class="panel-right" aria-label="Chess Board">

      <!-- Board -->
      <div class="board-container">
        <div class="file-labels">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
        <div class="board-row">
          <div class="rank-labels">
            <span>8</span><span>7</span><span>6</span><span>5</span>
            <span>4</span><span>3</span><span>2</span><span>1</span>
          </div>
          <div class="board-frame">
            <div id="chess-board" role="grid" aria-label="Chess board"></div>
          </div>
          <div class="rank-labels">
            <span>8</span><span>7</span><span>6</span><span>5</span>
            <span>4</span><span>3</span><span>2</span><span>1</span>
          </div>
        </div>
        <div class="file-labels">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
      </div>

      <!-- Status Bar (shows spoken move description) -->
      <div class="status-bar" id="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">Paste a PGN and click Visualize Game</span>
      </div>

      <!-- Captures -->
      <div class="captures-section">
        <div class="capture-box">
          <div class="cap-label">⬛ Black captures</div>
          <span id="black-captures" class="cap-pieces"></span>
        </div>
        <div class="capture-box">
          <div class="cap-label">⬜ White captures</div>
          <span id="white-captures" class="cap-pieces"></span>
        </div>
      </div>

    </section>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast" role="alert" aria-live="assertive"></div>

<script src="pieces-svg.js"></script>
<script src="chess-engine.js"></script>
<script src="app.js"></script>
</body>
</html>
